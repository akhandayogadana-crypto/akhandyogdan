<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prashasti Patra - Akhand Yogdan Association</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;padding:0;font-family:'Poppins',sans-serif;background:#f5f5f5}
.certificate-wrapper{max-width:1100px;margin:20px auto;background:white;box-shadow:0 0 25px rgba(0,0,0,0.3)}
.certificate{
  position:relative;
  width:100%;
  height:800px;
  background:url('certificate-bg.jpg') no-repeat center;
  background-size:100% 100%;
}
.cert-field{position:absolute;font-weight:600;color:#000}
.name-field{top:265px;left:180px;width:650px;text-align:center;font-size:34px;color:#1a237e;font-family:'Playfair Display',serif;font-weight:700}
.father-field{top:265px;left:550px;width:350px;text-align:center;font-size:22px}
.event-field{top:325px;left:580px;width:320px;text-align:left;font-size:18px;font-style:italic}
.date-field{top:455px;left:170px;font-size:16px;width:150px;text-align:center}
.place-field{top:455px;left:420px;font-size:16px;width:180px;text-align:center}
.position-field{top:525px;left:180px;font-size:16px;width:280px;text-align:left}
.eventname-field{top:525px;left:650px;font-size:16px;width:250px;text-align:left}
.session-field{top:545px;left:650px;font-size:16px;width:250px;text-align:left}
.certno-field{top:420px;right:95px;font-size:15px;color:#d32f2f;font-weight:700}
.regno-field{top:125px;left:95px;font-size:14px;color:#d32f2f;font-weight:700}
.director-field{bottom:115px;left:110px;width:220px;text-align:center;font-size:16px;font-weight:600}
.state-field{bottom:115px;left:440px;width:220px;text-align:center;font-size:16px;font-weight:600}
.district-field{bottom:115px;right:110px;width:220px;text-align:center;font-size:16px;font-weight:600}
.qr-code{position:absolute;bottom:95px;right:85px;width:95px;height:95px;border:2px solid #1a237e;padding:3px;background:white}
.btn-print{position:fixed;bottom:25px;right:25px;padding:15px 35px;background:#ff6f00;color:white;border:none;border-radius:8px;font-size:17px;font-weight:600;cursor:pointer;z-index:999;box-shadow:0 4px 12px rgba(255,111,0,0.4)}
.btn-print:hover{background:#e65100}
@media print{.btn-print{display:none}body{background:white}.certificate-wrapper{margin:0;box-shadow:none}}
</style>
</head>
<body>

<div class="certificate-wrapper">
<div class="certificate">
  <div class="cert-field regno-field" id="regNo">AYA/2025-2026/001</div>
  <div class="cert-field name-field" id="studentName">STUDENT NAME</div>
  <div class="cert-field father-field" id="fatherName">SURESH KUMAR</div>
  <div class="cert-field event-field" id="eventName">GK COMPETITION</div>
  <div class="cert-field date-field" id="date">28/04/2026</div>
  <div class="cert-field place-field" id="place">SULTANPUR</div>
  <div class="cert-field position-field" id="position">1st Position</div>
  <div class="cert-field eventname-field" id="eventName2">GK Competition</div>
  <div class="cert-field session-field" id="session">2025-26</div>
  <div class="cert-field certno-field" id="certNo">AYA/ACH/2025-26/A/001</div>
  <div class="cert-field director-field" id="director">Er. Om Kumar Verma</div>
  <div class="cert-field state-field" id="statePres">STATE PRESIDENT NAME</div>
  <div class="cert-field district-field" id="districtPres">DISTRICT PRESIDENT NAME</div>
  <img class="qr-code" id="qrCode" src="" alt="QR Code">
</div>
</div>

<button class="btn-print" onclick="window.print()">🖨️ Print / Save PDF</button>

<script>
// URL से data लेगा: prashasti-patra.html?name=Rahul&father=Suresh&event=GK&pos=1st&date=28/04/2026&place=Sultanpur&cat=Academic&session=2025-26&certno=AYA/ACH/2025-26/A/001
const p = new URLSearchParams(window.location.search);
document.getElementById('studentName').innerText = (p.get('name') || 'STUDENT NAME').toUpperCase();
document.getElementById('fatherName').innerText = (p.get('father') || 'FATHER NAME').toUpperCase();
document.getElementById('eventName').innerText = p.get('event') || 'EVENT NAME';
document.getElementById('eventName2').innerText = p.get('event') || 'EVENT NAME';
document.getElementById('position').innerText = p.get('pos') || 'Position';
document.getElementById('category').innerText = p.get('cat') || 'Academic';
document.getElementById('date').innerText = p.get('date') || new Date().toLocaleDateString('en-IN');
document.getElementById('place').innerText = (p.get('place') || 'SULTANPUR').toUpperCase();
document.getElementById('session').innerText = p.get('session') || '2025-26';
document.getElementById('certNo').innerText = p.get('certno') || 'AYA/ACH/2025-26/A/001';
document.getElementById('regNo').innerText = p.get('regno') || 'AYA/2025-2026/001';

// QR Code - verification link
let verifyLink = window.location.href;
document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(verifyLink)}`;
</script>

</body>
</html>
