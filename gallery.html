    <script>
document.getElementById('menu-btn').onclick = function() {
    let menu = document.getElementById('mobile-menu');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}
document.querySelectorAll('.mobile-dropdown-toggle').forEach(function(btn) {
    btn.onclick = function(e) {
        e.preventDefault();
        let submenu = this.nextElementSibling;
        submenu.style.display = submenu.style.display === 'block' ? 'none' : 'block';
        this.innerHTML = submenu.style.display === 'block' ? this.innerHTML.replace('+', '-') : this.innerHTML.replace('-', '+');
    }
});
</script>

    <script>
    // Mobile Menu
    document.getElementById('menu-btn').onclick = function() {
        let menu = document.getElementById('mobile-menu');
        menu.style.display = menu.style.display === 'block'? 'none' : 'block';
    }
    document.querySelectorAll('.mobile-dropdown-toggle').forEach(function(btn) {
        btn.onclick = function(e) {
            e.preventDefault();
            let submenu = this.nextElementSibling;
            submenu.style.display = submenu.style.display === 'block'? 'none' : 'block';
            this.innerHTML = submenu.style.display === 'block'? 'Activity -' : 'Activity +';
        }
    });

    // Gallery Lightbox
    function openLightbox(src) {
        document.getElementById('lightbox').style.display = 'flex';
        document.getElementById('lightbox-img').src = src;
    }
    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }
    </script>
