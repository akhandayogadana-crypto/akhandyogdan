<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Team - Akhand Yogdan Association</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    .navbar { background: #1a237e; color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.3rem; font-weight: bold; }
    .nav-links a { color: white; text-decoration: none; margin: 0 12px; }
    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    h1 { text-align: center; color: #1a237e; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 40px; }
    .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
    .member-card { background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; text-align: center; transition: 0.3s; }
    .member-card:hover { transform: translateY(-5px); }
    .member-photo { width: 100%; height: 220px; object-fit: cover; background: #e0e0e0; }
    .member-info { padding: 20px; }
    .member-name { font-size: 1.2rem; color: #1a237e; margin-bottom: 5px; font-weight: bold; }
    .member-role { color: #ff9800; font-weight: 600; margin-bottom: 8px; }
    .member-id { font-size: 0.85rem; color: #666; background: #f0f0f0; padding: 3px 10px; border-radius: 15px; display: inline-block; }
    .loading { text-align: center; padding: 50px; font-size: 1.1rem; color: #666; }
    .footer { background: #1a237e; color: white; text-align: center; padding: 20px; margin-top: 60px; }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">AYA Sultanpur</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About Founder</a>
      <a href="team.html">Our Team</a>
      <a href="admin.html">Admin</a>
    </div>
  </div>

  <div class="container">
    <h1>Our Team</h1>
    <p class="subtitle">अखंड योगदान एसोसिएशन के समर्पित सदस्य</p>
    <div id="teamGrid" class="team-grid">
      <div class="loading">Members load ho rahe hain...</div>
    </div>
  </div>

  <div class="footer">
    © 2026 Akhand Yogdan Association, Sultanpur | 📞 7905749751
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAnvvaIRrPWkc7EpjkUnz3iL4b8VDPDgXo",
      authDomain: "akhand-yogdan-association.firebaseapp.com",
      projectId: "akhand-yogdan-association",
      storageBucket: "akhand-yogdan-association.appspot.com",
      messagingSenderId: "543200856130",
      appId: "1:543200856130:web:31e5cb9a9b0270b9b1b4ac"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadTeam() {
      const teamGrid = document.getElementById('teamGrid');
      try {
        const q = query(
          collection(db, "members"), 
          where("verified", "==", true), 
          orderBy("createdAt", "desc"), 
          limit(10)
        );
        
        const querySnapshot = await getDocs(q);
        teamGrid.innerHTML = '';

        if (querySnapshot.empty) {
          teamGrid.innerHTML = '<div class="loading">Abhi koi verified member nahi hai</div>';
          return;
        }

        querySnapshot.forEach((doc) => {
          const data = doc.data();
          const photoUrl = data.photoUrl || 'https://via.placeholder.com/250x220?text=AYA+Member';
          
          teamGrid.innerHTML += `
            <div class="member-card">
              <img src="${photoUrl}" alt="${data.name}" class="member-photo">
              <div class="member-info">
                <div class="member-name">${data.name}</div>
                <div class="member-role">${data.role}</div>
                <div class="member-id">ID: ${data.memberId}</div>
              </div>
            </div>
          `;
        });

      } catch (error) {
        teamGrid.innerHTML = '<div class="loading">Error: Members load nahi ho paaye</div>';
        console.error(error);
      }
    }

    loadTeam();
  </script>
</body>
</html>
