<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - AYA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
   .login { max-width: 300px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
   .dashboard { display: none; max-width: 1200px; margin: 0 auto; }
    table { width: 100%; background: white; border-collapse: collapse; margin: 20px 0; border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
    th { background: #1a237e; color: white; }
   .stat { display: inline-block; background: white; padding: 20px; margin: 10px; border-radius: 10px; min-width: 150px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
   .btn { padding: 6px 12px; margin: 2px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
   .btn-verify { background: #4caf50; color: white; }
   .btn-join { background: #2196f3; color: white; }
   .btn-cert { background: #ff9800; color: white; }
   .btn-logout { background: #f44336; color: white; float: right; }
   .status-verified { color: #4caf50; font-weight: bold; }
   .status-pending { color: #ff9800; font-weight: bold; }
    input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    button { background: #1a237e; color: white; cursor: pointer; border: none; }
  </style>
</head>
<body>
  <div class="login" id="loginBox">
    <h2>General Admin Login</h2>
    <input type="password" id="pass" placeholder="Admin Password">
    <button onclick="login()">Login</button>
  </div>

  <div class="dashboard" id="dash">
    <h1>Akhand Yogdan Admin <button class="btn btn-logout" onclick="logout()">Logout</button></h1>

    <div class="stat"><h3>Total Members</h3><h2 id="totalMembers">0</h2></div>
    <div class="stat"><h3>Verified</h3><h2 id="verifiedCount">0</h2></div>
    <div class="stat"><h3>Pending</h3><h2 id="pendingCount">0</h2></div>
    <div class="stat"><h3>Messages</h3><h2 id="totalMsg">0</h2></div>

    <h2>All Members - General Admin Control</h2>
    <table id="memberTable"><tr><th>Name</th><th>Mobile</th><th>Post</th><th>ID No</th><th>Status</th><th>Actions</th></tr></table>

    <h2>Contact Messages</h2>
    <table id="msgTable"><tr><th>Name</th><th>Email</th><th>Message</th><th>Date</th></tr></table>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAnvvaIRrPWkc7EpjkUnz3iL4b8VDPDgXo",
    authDomain: "akhand-yogdan-52994.firebaseapp.com",
    projectId: "akhand-yogdan-52994",
    storageBucket: "akhand-yogdan-52994.firebasestorage.app",
    messagingSenderId: "280876103435",
    appId: "1:280876103435:web:fe78faaab347935d0c540e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const { jsPDF } = window.jspdf;

  // YAHAN APNI IMAGE KE LINKS YA BASE64 DAAL DE
  const LOGO_URL = 'https://i.imgur.com/yourlogo.png'; // <-- Change kar
  const SEAL_URL = 'https://i.imgur.com/yourseal.png'; // <-- Change kar  
  const SIGN_URL = 'https://i.imgur.com/yoursign.png'; // <-- Change kar

  window.login = function() {
    if (document.getElementById('pass').value === 'AYA2026') {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      localStorage.setItem('isAdmin', 'true');
      loadData();
    } else {
      alert('Wrong Password');
    }
  }

  window.logout = function() {
    localStorage.removeItem('isAdmin');
    location.reload();
  }

  if(localStorage.getItem('isAdmin') === 'true') {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    loadData();
  }

  async function loadData() {
    const members = await getDocs(collection(db, "members"));
    document.getElementById('totalMembers').innerText = members.size;

    let verified = 0, pending = 0;
    let mHtml = '<tr><th>Name</th><th>Mobile</th><th>Post</th><th>ID No</th><th>Status</th><th>Actions</th></tr>';

    members.forEach(docSnap => {
      const m = docSnap.data();
      const id = docSnap.id;
      const status = m.verified? 'Verified' : 'Pending';
      const statusClass = m.verified? 'status-verified' : 'status-pending';

      if(m.verified) verified++; else pending++;

      mHtml += `<tr>
        <td>${m.name}</td>
        <td>${m.mobile}</td>
        <td>${m.post}</td>
        <td>${m.idCardNo}</td>
        <td class="${statusClass}">${status}</td>
        <td>
          ${!m.verified? `<button class="btn btn-verify" onclick="verifyMember('${id}')">Verify</button>` : ''}
          <button class="btn btn-join" onclick="generateJoining('${m.name}', '${m.post}', '${m.idCardNo}')">Joining Letter</button>
          <button class="btn btn-cert" onclick="generateCert('${m.name}', '${m.post}', '${m.idCardNo}')">Certificate</button>
        </td>
      </tr>`;
    });

    document.getElementById('memberTable').innerHTML = mHtml;
    document.getElementById('verifiedCount').innerText = verified;
    document.getElementById('pendingCount').innerText = pending;

    const msgs = await getDocs(collection(db, "messages"));
    document.getElementById('totalMsg').innerText = msgs.size;
    let msgHtml = '<tr><th>Name</th><th>Email</th><th>Message</th><th>Date</th></tr>';
    msgs.forEach(doc => {
      const m = doc.data();
      msgHtml += `<tr><td>${m.name}</td><td>${m.email}</td><td>${m.message}</td><td>${new Date(m.date.seconds*1000).toLocaleDateString()}</td></tr>`;
    });
    document.getElementById('msgTable').innerHTML = msgHtml;
  }

  window.verifyMember = async function(docId) {
    if(confirm('Verify this member?')) {
      await updateDoc(doc(db, "members", docId), { verified: true, verifiedDate: new Date() });
      alert('Member Verified Successfully');
      loadData();
    }
  }

  // JOINING LETTER PDF with Logo + Sign
  window.generateJoining = function(name, post, idNo) {
    const pdf = new jsPDF();
    const date = new Date().toLocaleDateString('en-GB');
    
    // Logo
    pdf.addImage(LOGO_URL, 'PNG', 85, 10, 40, 40);
    
    pdf.setFontSize(22);
    pdf.setFont('helvetica', 'bold');
    pdf.text('AKHAND YOGDAN ASSOCIATION', 105, 60, { align: 'center' });
    
    pdf.setFontSize(16);
    pdf.text('JOINING LETTER', 105, 70, { align: 'center' });
    pdf.line(20, 75, 190, 75);
    
    pdf.setFontSize(12);
    pdf.setFont('helvetica', 'normal');
    pdf.text(`Date: ${date}`, 20, 90);
    pdf.text(`ID No: ${idNo}`, 20, 100);
    
    pdf.text(`Dear ${name},`, 20, 120);
    
    const text = `We are pleased to confirm your appointment as ${post} in Akhand Yogdan Association. We welcome you to our organization and look forward to your valuable contribution towards our mission.`;
    const splitText = pdf.splitTextToSize(text, 170);
    pdf.text(splitText, 20, 135);
    
    pdf.text('Your joining is effective from the date of this letter.', 20, 160);
    pdf.text('Welcome to our team.', 20, 175);
    
    // Signature
    pdf.text('Sincerely,', 20, 205);
    pdf.addImage(SIGN_URL, 'PNG', 20, 210, 40, 15);
    pdf.setFont('helvetica', 'bold');
    pdf.text('General Admin', 20, 232);
    pdf.text('Akhand Yogdan Association', 20, 240);
    
    // Seal
    pdf.addImage(SEAL_URL, 'PNG', 150, 210, 35, 35);
    
    pdf.save(`Joining_Letter_${name.replace(/ /g,'_')}.pdf`);
  }

  // CERTIFICATE PDF with Logo + Seal + Sign
  window.generateCert = function(name, post, idNo) {
    const pdf = new jsPDF('l', 'mm', 'a4');
    const date = new Date().toLocaleDateString('en-GB');
    
    // Border
    pdf.setDrawColor(26, 35, 126);
    pdf.setLineWidth(2);
    pdf.rect(10, 10, 277, 190);
    pdf.setLineWidth(0.5);
    pdf.rect(15, 15, 267, 180);
    
    // Logo
    pdf.addImage(LOGO_URL, 'PNG', 128.5, 20, 40, 40);
    
    pdf.setFontSize(28);
    pdf.setFont('helvetica', 'bold');
    pdf.setTextColor(26, 35, 126);
    pdf.text('AKHAND YOGDAN ASSOCIATION', 148.5, 75, { align: 'center' });
    
    pdf.setFontSize(20);
    pdf.setTextColor(0, 0, 0);
    pdf.text('CERTIFICATE OF MEMBERSHIP', 148.5, 88, { align: 'center' });
    
    pdf.setFontSize(14);
    pdf.setFont('helvetica', 'normal');
    pdf.text('This is to certify that', 148.5, 105, { align: 'center' });
    
    pdf.setFontSize(26);
    pdf.setFont('helvetica', 'bold');
    pdf.setTextColor(57, 73, 171);
    pdf.text(name.toUpperCase(), 148.5, 120, { align: 'center' });
    
    pdf.setFontSize(14);
    pdf.setFont('helvetica', 'normal');
    pdf.setTextColor(0, 0, 0);
    pdf.text(`is an active member of Akhand Yogdan Association`, 148.5, 135, { align: 'center' });
    pdf.text(`holding the position of ${post}`, 148.5, 145, { align: 'center' });
    pdf.text(`ID No: ${idNo}`, 148.5, 155, { align: 'center' });
    pdf.text(`Date of Issue: ${date}`, 148.5, 165, { align: 'center' });
    
    // Signature
    pdf.addImage(SIGN_URL, 'PNG', 60, 170, 50, 15);
    pdf.line(60, 188, 110, 188);
    pdf.text('General Admin', 85, 195, { align: 'center' });
    
    // Seal
    pdf.addImage(SEAL_URL, 'PNG', 200, 165, 40, 40);
    
    pdf.save(`Certificate_${name.replace(/ /g,'_')}.pdf`);
  }
</script>
</body>
</html>
