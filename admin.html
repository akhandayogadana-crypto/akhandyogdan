<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>AYA Admin</title>
  <style>
    body{font-family:Arial;background:#f5f5f5;padding:20px}
    .box{max-width:400px;margin:50px auto;background:#fff;padding:25px;border-radius:8px}
    input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:4px}
    button{width:100%;padding:12px;background:#1a237e;color:#fff;border:none;border-radius:4px;cursor:pointer}
    .hidden{display:none}
  </style>
</head>
<body>
  <div id="login" class="box">
    <h2>Admin Login</h2>
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div id="panel" class="box hidden">
    <h2>Add Member</h2>
    <input id="name" placeholder="Full Name">
    <input id="role" placeholder="Role">
    <input id="memberId" placeholder="Member ID">
    <input id="photoUrl" placeholder="Photo URL - Khali bhi chalega">
    <label><input type="checkbox" id="verified"> Verified</label>
    <button onclick="add()">Add Member</button>
    <p id="msg" style="color:green;text-align:center"></p>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAnvvaIRrPWkc7EpjkUnz3iL4b8VDPDgXo",
    authDomain: "akhand-yogdan-association.firebaseapp.com",
    projectId: "akhand-yogdan-association"
  });
  const db = getFirestore(app);

  window.login = () => {
    if(document.getElementById('pass').value === "AYA2026"){
      document.getElementById('login').classList.add('hidden');
      document.getElementById('panel').classList.remove('hidden');
    } else alert('Wrong Password');
  }

  window.add = async () => {
    try {
      await addDoc(collection(db, "members"), {
        name: document.getElementById('name').value,
        role: document.getElementById('role').value,
        memberId: document.getElementById('memberId').value,
        photoUrl: document.getElementById('photoUrl').value || 'https://via.placeholder.com/150',
        verified: document.getElementById('verified').checked,
        createdAt: new Date()
      });
      document.getElementById('msg').innerText = 'Ho Gaya Add! Team page check karo';
    } catch (e) {
      alert('Error: ' + e.message);
      console.log(e);
    }
  }
</script>
</body>
</html>
