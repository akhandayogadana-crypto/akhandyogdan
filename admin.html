<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Akhand Yogdan</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
      .login-box,.admin-panel { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 500px; }
      .login-box h2,.admin-panel h2 { color: #1a237e; text-align: center; margin-bottom: 30px; }
      .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; }
      .login-box button,.admin-btn { width: 100%; padding: 12px; background: #1a237e; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin: 8px 0; }
      .login-box button:hover,.admin-btn:hover { background: #0d1442; }
      .admin-panel { display: none; }
      .admin-btn { display: block; text-decoration: none; text-align: center; }
      .error { color: red; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<!-- Login Box -->
<div class="login-box" id="loginBox">
    <h2>🔒 Admin Login</h2>
    <input type="password" id="adminPass" placeholder="Enter Admin Password">
    <button onclick="checkLogin()">Login</button>
    <p class="error" id="errorMsg">Wrong Password!</p>
</div>

<!-- Admin Panel - Password ke baad dikhega -->
<div class="admin-panel" id="adminPanel">
    <h2>Admin Dashboard</h2>
    <a href="idcard.html" class="admin-btn">🆔 ID Card Generator</a>
    <a href="certificate.html" class="admin-btn">📜 Certificate Generator</a>
    <a href="joining-letter.html" class="admin-btn">📄 Joining Letter</a>
    <a href="verification.html" class="admin-btn">✅ Member Verification</a>
    <a href="membership-details.html" class="admin-btn">👥 Membership Details</a>
    <button class="admin-btn" onclick="logout()" style="background: #d32f2f;">Logout</button>
</div>

<script>
const ADMIN_PASSWORD = "Omv@2026"; // Apna password yaha change kar de

function checkLogin() {
    let pass = document.getElementById('adminPass').value;
    if(pass === ADMIN_PASSWORD) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        sessionStorage.setItem('adminLoggedIn', 'true');
    } else {
        document.getElementById('errorMsg').style.display = 'block';
    }
}

function logout() {
    sessionStorage.removeItem('adminLoggedIn');
    location.reload();
}

// Page load pe check karo login hai ya nahi
if(sessionStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
}
</script>

</body>
</html>
